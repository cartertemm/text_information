# Ruff configuration for the Text Information NVDA add-on.
# Based on but slightly modified from the reference ruff add-on template config for NVDA add-ons. The project uses tabs.

line-length = 110

builtins = [
	# translation lookup
	"_",
	# translation lookup
	"ngettext",
	# translation lookup
	"pgettext",
	# translation lookup
	"npgettext",
]

include = [
	"*.py",
	"sconstruct",
]

exclude = [
	".git",
	"__pycache__",
	".venv",
	"buildVars.py",
	# bundled third-party modules
	"bs4",
	"_markupbase.py",
	"isbn.py",
]

[format]
indent-style = "tab"
line-ending = "lf"

[lint]
# Keep ruff's default rules (E4, E7, E9, F) plus mccabe complexity (C901),
# which the old flake8 setup enabled via max-complexity.
extend-select = ["C901"]
ignore = [
	"E402",
	# indentation contains tabs
	"W191",
]
logger-objects = ["logHandler.log"]

[lint.mccabe]
max-complexity = 15

[lint.per-file-ignores]
# sconstruct relies on SCons builtins the linter cannot see, so ignore F821.
"sconstruct" = ["F821"]
